<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>TRUTH-OR-FOLSE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        function App() {
            const [claim, setClaim] = useState('');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);

            const check = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/api/verify', {
                        method: 'POST',
                        body: JSON.stringify({ claim })
                    });
                    const data = await res.json();
                    setResults(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch (e) { alert("שגיאה בסריקה"); }
                setLoading(false);
            };

            return (
                <div className="p-8 max-w-4xl mx-auto">
                    <h1 className="text-4xl font-black text-blue-500 mb-8 italic">TRUTH-NETWORK</h1>
                    <textarea value={claim} onChange={e => setClaim(e.target.value)} className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl mb-4 h-32" placeholder="הזן טענה..."/>
                    <button onClick={check} className="w-full py-4 bg-blue-600 rounded-2xl font-bold text-xl">
                        {loading ? "סורק מקורות..." : "הפעל בדיקה"}
                    </button>
                    {results && (
                        <div className="mt-8">
                            <div className="bg-blue-900/20 p-6 rounded-3xl border border-blue-500/30 mb-6">
                                <p className="text-xl">{results.executiveSummary}</p>
                                <div className="mt-4 font-bold text-2xl">פסיקה: {results.verdict}</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
