<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUTH-NETWORK AGENT</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [claim, setClaim] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [results, setResults] = useState(null);

            const runAnalysis = async () => {
                if (!claim.trim()) return;
                setIsAnalyzing(true);
                
                // כאן אנחנו מושכים את המפתח. ב-Vercel זה יעבוד דרך משתנה הסביבה
                const API_KEY = "AIzaSyBpdHE6WL5jeG8iJk1BI6-Db398N4nQvT8"; 

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Analyze this claim/topic in 30 sources (10 Israel, 10 Global, 10 Info/Data) and return a detailed Hebrew JSON: "${claim}"` }] }],
                            systemInstruction: { parts: [{ text: "You are a professional fact-checker. Return JSON only with 'executiveSummary', 'verdict', and 'categories' (ISRAEL, GLOBAL, INFO)." }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    setResults(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch (err) {
                    alert("שגיאה בחיבור לבוטים");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen text-slate-100 p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-8">
                            <h1 className="text-4xl font-black text-blue-500 italic">TRUTH-NETWORK</h1>
                        </header>

                        <div className="bg-slate-900 p-6 rounded-3xl mb-6">
                            <textarea 
                                value={claim}
                                onChange={(e) => setClaim(e.target.value)}
                                className="w-full bg-black border border-slate-700 rounded-xl p-4 text-lg text-white mb-4 outline-none h-28"
                                placeholder="הזן טענה לבדיקה..."
                            />
                            <button 
                                onClick={runAnalysis}
                                disabled={isAnalyzing}
                                className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-xl font-bold transition-all"
                            >
                                {isAnalyzing ? "בוטים סורקים..." : "הפעל בדיקה רוחבית"}
                            </button>
                        </div>

                        {results && (
                            <div className="animate-in fade-in duration-500">
                                <div className="bg-blue-900/20 border border-blue-500/30 p-6 rounded-3xl mb-8">
                                    <h2 className="text-blue-400 font-bold mb-2">סיכום מנהלי:</h2>
                                    <p className="text-xl">{results.executiveSummary}</p>
                                    <div className="mt-4 font-black text-2xl">פסיקה: {results.verdict}</div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {Object.entries(results.categories).map(([key, list]) => (
                                        <div key={key} className="space-y-2">
                                            <h3 className="font-bold border-b border-slate-800 pb-1 text-slate-400">{key}</h3>
                                            {list.map((s, i) => (
                                                <div key={i} className="bg-slate-900 p-2 rounded-lg text-[10px] border border-slate-800">
                                                    <div className="font-bold">{s.name}</div>
                                                    <div className="opacity-60">{s.explanation}</div>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
